server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_types      text/html text/css application/javascript image/svg+xml font/woff2;
    gzip_min_length 1000;

    # Aggressive caching for immutable assets
    location ~* \.(css|js|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML: always revalidate so deploys are instant
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header Referrer-Policy         "no-referrer"   always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none';" always;
}
